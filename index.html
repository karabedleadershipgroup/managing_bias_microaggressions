<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bias & Microaggressions — Practice Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1A2044; --navy-deep:#121634; --gold:#C9A84C; --gold-soft:#E0CA8C;
    --cream:#F5F3EF; --paper:#FAF8F4; --ink:#26303F; --muted:#6B7280;
    --sage:#8DA98C; --terra:#C77B53; --line:#E4DFD5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);
    background:var(--navy-deep);
    -webkit-font-smoothing:antialiased;line-height:1.5;
  }
  .serif{font-family:'Playfair Display',Georgia,serif}
  #app{min-height:100vh;display:flex;flex-direction:column}

  /* ===== PICKER ===== */
  #picker{
    min-height:100vh;
    background:
      radial-gradient(1100px 600px at 80% -5%, rgba(201,168,76,.16), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(141,169,140,.12), transparent 60%),
      linear-gradient(180deg,#1A2044 0%, #181D3E 55%, #121634 100%);
    padding:54px 22px 60px;display:flex;flex-direction:column;align-items:center;
  }
  .picker-logo{height:56px;margin-bottom:30px;opacity:1}
  .eyebrow{
    color:var(--gold);font-size:12px;font-weight:600;letter-spacing:.28em;
    text-transform:uppercase;text-align:center;margin-bottom:10px;
  }
  .picker-title{
    color:#fff;font-size:clamp(40px,6vw,62px);font-weight:700;line-height:1.02;
    text-align:center;letter-spacing:-.5px;
  }
  .picker-sub{
    color:var(--gold-soft);font-size:clamp(19px,2.6vw,25px);font-style:italic;
    font-weight:500;text-align:center;margin-top:6px;
  }
  .card{
    background:var(--cream);border-radius:22px;max-width:830px;width:100%;
    margin-top:36px;padding:36px 38px 30px;
    box-shadow:0 30px 70px -28px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.04);
  }
  .intro{color:#3a4654;font-size:16.5px;line-height:1.62;max-width:640px}
  .disclaimer{color:#7d745f;font-size:13px;font-style:italic;line-height:1.5;margin-top:15px;padding:12px 15px;background:#EFEADF;border:1px solid #E4DCC9;border-radius:11px;max-width:660px}
  .divider{
    display:flex;align-items:center;gap:16px;margin:26px 2px 20px;
    color:#9aa1ab;font-size:11.5px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  }
  .divider::before,.divider::after{content:"";height:1px;background:var(--line);flex:1}
  .modes{display:flex;flex-direction:column;gap:13px}
  .mode-card{
    display:flex;align-items:center;gap:18px;width:100%;text-align:left;
    background:#fff;border:1px solid #ECE7DD;border-left-width:5px;border-radius:14px;
    padding:17px 20px;cursor:pointer;transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    font-family:inherit;
  }
  .mode-card:hover{transform:translateY(-2px);box-shadow:0 14px 30px -16px rgba(27,42,74,.4)}
  .mc-icon{
    width:46px;height:46px;border-radius:13px;flex:none;display:flex;align-items:center;justify-content:center;
  }
  .mc-icon svg{width:22px;height:22px}
  .mc-body{flex:1;min-width:0}
  .mc-title{display:block;font-family:'Playfair Display',serif;font-weight:600;font-size:20px;color:var(--navy);line-height:1.15}
  .mc-desc{display:block;color:#6e7681;font-size:14.5px;margin-top:6px;line-height:1.45}
  .mc-arrow{color:#b9bfc8;font-size:20px;flex:none}
  .mode-card:hover .mc-arrow{color:var(--navy)}
  /* accents */
  .a-gold{border-left-color:var(--gold)} .a-gold .mc-icon{background:#F4E9C9;color:#9c7e1f}
  .a-navy{border-left-color:var(--navy)} .a-navy .mc-icon{background:#E4E8F0;color:var(--navy)}
  .a-sage{border-left-color:var(--sage)} .a-sage .mc-icon{background:#E2EBE1;color:#4f6b4e}
  .a-terra{border-left-color:var(--terra)} .a-terra .mc-icon{background:#F4E3D7;color:#b05f37}
  .a-isa{border-left-color:var(--gold)} .a-isa .mc-icon{background:#F4E9C9;color:#9c7e1f}
  .foot{
    text-align:center;color:#9aa1ab;font-size:12.5px;font-style:italic;
    margin-top:26px;padding-top:18px;border-top:1px solid var(--line);line-height:1.5;
  }
  .lang-toggle{
    position:absolute;top:22px;right:22px;display:flex;gap:2px;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:3px;
  }
  .lang-toggle button{
    background:transparent;border:none;color:#cdd3df;font-family:inherit;font-size:12.5px;font-weight:600;
    padding:5px 13px;border-radius:999px;cursor:pointer;letter-spacing:.04em;
  }
  .lang-toggle button.on{background:var(--gold);color:#1b2a4a}
  /* gate + terms */
  .full{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:48px 22px;
    background:radial-gradient(1100px 600px at 80% -5%, rgba(201,168,76,.16), transparent 60%),radial-gradient(900px 600px at -10% 110%, rgba(141,169,140,.12), transparent 60%),linear-gradient(180deg,#1A2044 0%, #181D3E 55%, #121634 100%)}
  .full.on{display:flex}
  .full-logo{height:52px;margin-bottom:26px}
  .full-card{background:var(--cream);border-radius:22px;max-width:560px;width:100%;padding:34px 34px 30px;box-shadow:0 30px 70px -28px rgba(0,0,0,.55)}
  .full-eyebrow{color:var(--gold);font-size:12px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;text-align:center;margin-bottom:8px}
  .full-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--navy);text-align:center;line-height:1.12}
  .full-sub{color:#5c6470;font-size:15px;text-align:center;margin-top:10px;line-height:1.55}
  .gate-input{width:100%;margin-top:22px;font-family:inherit;font-size:17px;text-align:center;letter-spacing:.04em;color:var(--ink);border:1.5px solid #D9D3C7;border-radius:14px;padding:15px 16px;background:#fff;outline:none}
  .gate-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.15)}
  .full-btn{width:100%;margin-top:16px;background:linear-gradient(150deg,#D8B85A,#C9A84C);color:#1b2a4a;border:none;font-family:inherit;font-weight:600;font-size:16px;padding:15px;border-radius:14px;cursor:pointer;box-shadow:0 12px 24px -12px rgba(201,168,76,.8)}
  .full-btn:disabled{opacity:.45;cursor:default;box-shadow:none}
  .gate-err{color:#b0452e;font-size:14px;text-align:center;margin-top:12px;min-height:18px}
  .terms-box{margin-top:18px;max-height:34vh;overflow-y:auto;background:#fff;border:1px solid #E4DCC9;border-radius:12px;padding:16px 18px;color:#3a4250;font-size:13.5px;line-height:1.6}
  .terms-box h4{font-family:'Playfair Display',serif;color:var(--navy);font-size:15px;margin:14px 0 4px}
  .terms-box h4:first-child{margin-top:0}
  .terms-box p{margin:0 0 8px}
  .terms-check{display:flex;align-items:flex-start;gap:10px;margin-top:16px;cursor:pointer;color:#3a4250;font-size:14px;line-height:1.45}
  .terms-check input{margin-top:3px;width:18px;height:18px;flex:none;accent-color:var(--gold)}

  /* ===== SCREEN (chat / slide / quiz) ===== */
  .screen{display:none;flex-direction:column;height:100vh;background:var(--paper)}
  .screen.active{display:flex}
  .band{
    position:relative;flex:none;
    background:
      radial-gradient(700px 240px at 88% -40%, rgba(201,168,76,.22), transparent 60%),
      linear-gradient(180deg,#1A2044,#141833);
    color:#fff;padding:16px 22px;display:flex;align-items:center;gap:16px;
  }
  .band .b-logo{height:40px;opacity:1}
  .band .b-meta{flex:1;min-width:0}
  .band .b-eyebrow{color:var(--gold);font-size:10px;font-weight:600;letter-spacing:.24em;text-transform:uppercase}
  .band .b-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:600;line-height:1.1;margin-top:1px}
  .back{
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;
    font-family:inherit;font-size:13px;font-weight:500;padding:8px 14px;border-radius:999px;cursor:pointer;flex:none;
  }
  .back:hover{background:rgba(255,255,255,.2)}

  /* chat */
  .thread{flex:1;overflow-y:auto;padding:22px 18px 12px;display:flex;flex-direction:column;gap:16px;justify-content:flex-start}
  .thread-inner{max-width:720px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:16px}
  .bubble{max-width:86%;padding:14px 17px;font-size:15.5px;line-height:1.55;animation:rise .4s cubic-bezier(.2,.7,.3,1)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .b-ai{align-self:flex-start;background:#fff;border:1px solid #EEE9DF;border-radius:5px 16px 16px 16px;
    box-shadow:0 12px 26px -18px rgba(27,42,74,.5),0 1px 0 rgba(0,0,0,.02);color:#2a3340}
  .b-ai .eb{color:var(--gold);font-size:9.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;display:block;margin-bottom:6px}
  .b-user{align-self:flex-end;background:linear-gradient(160deg,#22345a,#1a2944);color:#fff;border-radius:16px 16px 5px 16px;box-shadow:0 12px 24px -18px rgba(27,42,74,.7)}
  .b-ai p{margin:0 0 9px} .b-ai p:last-child{margin:0}
  .b-ai strong{color:var(--navy)}
  .typing{display:flex;gap:5px;padding:4px 2px}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--gold);opacity:.5;animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  /* composer */
  .composer{flex:none;border-top:1px solid var(--line);background:#fff;padding:14px 18px 18px}
  .composer-inner{max-width:720px;margin:0 auto}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:11px}
  .chip{background:var(--cream);border:1px solid var(--line);color:#5c6470;font-family:inherit;font-size:13px;
    padding:7px 14px;border-radius:999px;cursor:pointer;transition:transform .14s,box-shadow .14s}
  .chip:hover{transform:translateY(-1px);box-shadow:0 8px 16px -10px rgba(27,42,74,.4);border-color:var(--gold)}
  .input-row{display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;min-height:60px;max-height:160px;resize:none;font-family:inherit;font-size:16px;color:var(--ink);
    border:1px solid #D9D3C7;border-radius:16px;padding:15px 16px;background:var(--paper);outline:none;line-height:1.45}
  textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.15)}
  .send{flex:none;width:54px;height:54px;border-radius:16px;border:none;cursor:pointer;
    background:linear-gradient(150deg,#D8B85A,#C9A84C);color:#1b2a4a;
    box-shadow:0 10px 22px -10px rgba(201,168,76,.8);transition:transform .14s,filter .14s}
  .send:hover{transform:translateY(-1px);filter:brightness(1.05)} .send:disabled{opacity:.45;cursor:default;transform:none}
  .send svg{width:22px;height:22px}
  .hr-note{font-size:11.5px;color:#9aa1ab;text-align:center;margin-top:9px;line-height:1.4}

  /* slides */
  .slide-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 24px;text-align:center}
  .slide-count{color:var(--gold);font-size:12px;font-weight:600;letter-spacing:.2em;margin-bottom:22px}
  .slide-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4.5vw,40px);font-weight:700;color:var(--navy);max-width:760px;line-height:1.12}
  .slide-body{font-size:clamp(17px,2.3vw,20px);color:#46505d;max-width:680px;margin-top:20px;line-height:1.6}
  .slide-body ul{text-align:left;display:inline-block;margin-top:6px}
  .slide-body li{margin:8px 0}
  .slide-nav{flex:none;display:flex;justify-content:space-between;align-items:center;max-width:760px;width:100%;margin:0 auto;padding:18px 24px 26px}
  .nav-btn{background:var(--navy);color:#fff;border:none;font-family:inherit;font-size:14px;font-weight:500;padding:11px 22px;border-radius:999px;cursor:pointer}
  .nav-btn:disabled{opacity:.3;cursor:default} .nav-btn:hover:not(:disabled){background:#22345a}

  /* quiz */
  .quiz-wrap{flex:1;overflow-y:auto;padding:28px 20px 40px}
  .quiz-inner{max-width:660px;margin:0 auto}
  .quiz-scenario{background:#fff;border:1px solid #EEE9DF;border-radius:18px;padding:26px 26px;
    font-family:'Playfair Display',serif;font-size:21px;line-height:1.4;color:var(--navy);
    box-shadow:0 18px 40px -26px rgba(27,42,74,.5);margin-bottom:20px}
  .quiz-prompt{font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.04em;margin:0 4px 12px}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid #E2DDD2;border-radius:14px;
    padding:15px 17px;margin-bottom:11px;font-family:inherit;font-size:15.5px;color:#2c3543;cursor:pointer;
    transition:transform .14s,box-shadow .14s,border-color .14s;line-height:1.45}
  .opt:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 10px 22px -14px rgba(27,42,74,.4);border-color:var(--gold)}
  .opt:disabled{cursor:default}
  .opt.best{border-color:#4f8a52;background:#EAF3EA}
  .opt.med{border-color:#C9A84C;background:#FaF3DD}
  .opt.least{border-color:#C2705A;background:#F8E7DF}
  .fb{font-size:14px;line-height:1.5;margin-top:7px;padding:11px 14px;border-radius:11px;animation:rise .35s ease}
  .fb.best{background:#EAF3EA;color:#2f5a32} .fb.med{background:#FaF3DD;color:#7a6420} .fb.least{background:#F8E7DF;color:#8a4332}
  .next-btn{margin-top:14px;background:linear-gradient(150deg,#D8B85A,#C9A84C);color:#1b2a4a;border:none;
    font-family:inherit;font-weight:600;font-size:15px;padding:13px 26px;border-radius:999px;cursor:pointer;
    box-shadow:0 12px 24px -12px rgba(201,168,76,.8)}
  .next-btn:hover{filter:brightness(1.05)}
  .loader-card{text-align:center;color:var(--muted);padding:40px;font-size:15px}
  .err-card{background:#fff;border:1px solid #EEE9DF;border-radius:16px;padding:24px;text-align:center;color:#8a4332}
  .err-card button{margin-top:14px;background:var(--navy);color:#fff;border:none;padding:10px 22px;border-radius:999px;cursor:pointer;font-family:inherit}
  @media(max-width:560px){.card{padding:26px 20px}.mc-desc{font-size:13.5px}.picker-title{font-size:38px}}
</style>
</head>
<body>
<div id="app">

  <!-- ACCESS GATE -->
  <div class="full" id="gate">
    <div class="lang-toggle">
      <button id="g-lang-en" class="on" onclick="setLang('en')">EN</button>
      <button id="g-lang-es" onclick="setLang('es')">ES</button>
    </div>
    <img class="full-logo" id="gate-logo" alt="Karabed Leadership Group">
    <div class="full-card">
      <div class="full-eyebrow" id="gate-eyebrow">Practice Companion</div>
      <div class="full-title" id="gate-title">Bias &amp; Microaggressions</div>
      <div class="full-sub" id="gate-sub"></div>
      <input class="gate-input" id="gate-input" type="password" autocomplete="off" />
      <button class="full-btn" id="gate-btn" onclick="checkGate()"></button>
      <div class="gate-err" id="gate-err"></div>
    </div>
  </div>

  <!-- TERMS OF USE -->
  <div class="full" id="terms">
    <div class="lang-toggle">
      <button id="t-lang-en" class="on" onclick="setLang('en')">EN</button>
      <button id="t-lang-es" onclick="setLang('es')">ES</button>
    </div>
    <img class="full-logo" id="terms-logo" alt="Karabed Leadership Group">
    <div class="full-card">
      <div class="full-eyebrow" id="terms-eyebrow">Terms of Use</div>
      <div class="full-title" id="terms-title"></div>
      <div class="terms-box" id="terms-box"></div>
      <label class="terms-check"><input type="checkbox" id="terms-agree" onchange="document.getElementById('terms-btn').disabled=!this.checked"><span id="terms-agree-label"></span></label>
      <button class="full-btn" id="terms-btn" onclick="acceptTerms()" disabled></button>
    </div>
  </div>

  <!-- PICKER -->
  <div id="picker">
    <div class="lang-toggle">
      <button id="lang-en" class="on" onclick="setLang('en')">EN</button>
      <button id="lang-es" onclick="setLang('es')">ES</button>
    </div>
    <img class="picker-logo" id="picker-logo" alt="Karabed Leadership Group">
    <div class="eyebrow" id="p-eyebrow">Practice Companion</div>
    <h1 class="picker-title serif" id="p-title">Bias &amp; Microaggressions</h1>
    <div class="picker-sub" id="p-sub">Managing Both in the Workplace</div>

    <div class="card">
      <p class="intro" id="p-intro"></p>
      <p class="disclaimer" id="p-disclaimer"></p>
      <div class="divider" id="p-divider">Choose how you want to practice</div>
      <div class="modes" id="modes"></div>
      <div class="foot" id="p-foot"></div>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div class="screen" id="chat-screen">
    <div class="band">
      <img class="b-logo" id="chat-logo" alt="KLG">
      <div class="b-meta"><div class="b-eyebrow" id="chat-eyebrow">Bias &amp; Microaggressions</div>
        <div class="b-title" id="chat-title"></div></div>
      <button class="back" onclick="toPicker()" id="chat-back">All modes</button>
    </div>
    <div class="thread" id="thread"><div class="thread-inner" id="thread-inner"></div></div>
    <div class="composer">
      <div class="composer-inner">
        <div class="chips" id="chips"></div>
        <div class="input-row">
          <textarea id="input" rows="1" placeholder=""></textarea>
          <button class="send" id="send" onclick="onSend()" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none"><path d="M4 12l16-8-6 16-3-7-7-1z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="hr-note" id="hr-note"></div>
      </div>
    </div>
  </div>

  <!-- SLIDE SCREEN -->
  <div class="screen" id="slide-screen">
    <div class="band">
      <img class="b-logo" id="slide-logo" alt="KLG">
      <div class="b-meta"><div class="b-eyebrow">Bias &amp; Microaggressions</div>
        <div class="b-title" id="slide-mode-title"></div></div>
      <button class="back" onclick="toPicker()">All modes</button>
    </div>
    <div class="slide-wrap">
      <div class="slide-count serif" id="slide-count"></div>
      <h2 class="slide-title" id="slide-title"></h2>
      <div class="slide-body" id="slide-body"></div>
    </div>
    <div class="slide-nav">
      <button class="nav-btn" id="slide-prev" onclick="slideMove(-1)"></button>
      <button class="nav-btn" id="slide-next" onclick="slideMove(1)"></button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quiz-screen">
    <div class="band">
      <img class="b-logo" id="quiz-logo" alt="KLG">
      <div class="b-meta"><div class="b-eyebrow">Bias &amp; Microaggressions</div>
        <div class="b-title" id="quiz-mode-title"></div></div>
      <button class="back" onclick="toPicker()">All modes</button>
    </div>
    <div class="quiz-wrap"><div class="quiz-inner" id="quiz-inner"></div></div>
  </div>

/* ============ TRAINING KNOWLEDGE (Layer 1) ============ */
const TRAINING_KNOWLEDGE = `
TRAINING: "Managing Unconscious Bias and Microaggressions at the Workplace" by Dr. Isa Karabed, DSW (Director of DEI and Lived Experience, DEILEX). Built for staff and leaders in homeless and social services. Purpose: build awareness of unconscious bias and microaggressions so people make fairer, more consistent decisions, foster psychological safety, and create a culture of belonging.

PART A — UNCONSCIOUS BIAS
Definition (Dr. Isa's own wording, use this framing): "Unconscious bias is the fast, automatic read our brains make about people before we have thought about it. It is normal and universal. It only becomes a problem when we act on the read without checking it."

How bias shows up at work (the training's three examples):
1. Assuming someone is less capable or needs more supervision because of their age, accent, education level, or role, rather than based on actual performance.
2. Seeing leadership qualities more quickly in people who look, speak, or act like past leaders, while overlooking others with the same skills.
3. Assuming someone is less committed or reliable because they request flexibility, have caregiving responsibilities, or work different shifts.

The impact of unconscious bias:
- It affects in-the-moment decisions: bias can lead us to give some people the benefit of the doubt while assuming the worst in others.
- It shapes whose voices are heard in a room.
- Similarity bias: we tend to treat people who are similar to us more favorably — more kind, more helpful.

Why manage it (benefits): make better decisions, consider more ideas, and build a more inclusive organization.

THE SECOND MOVE (Dr. Isa Karabed's framework, the core tool for managing bias). Core idea: "You can't stop the first thought. The second move is yours." Every brain makes a fast, automatic read of other people; you cannot switch that off. What you own is the deliberate second move that comes after. The first thought is not your fault; the second move is your responsibility. The second move has three steps, always in this order: SPOT, SORT, SERVE.
- SPOT: notice the automatic read your brain just made about someone, and name it to yourself as a thought, not a fact. (Failure mode: treating the first thought as information and acting on it instantly.)
- SORT: separate what you actually know from what your brain filled in. Ask one question: "What do I actually know here, and would I read this the same way if the person looked or sounded like me?" (Failure mode: hunting only for evidence that confirms the first read.)
- SERVE: respond to the real person and the evidence the way your values say you would, and where you can, build a small repeatable habit so the call is not left to mood, the same questions, the same criteria, the same benefit of the doubt you would give anyone. (Failure mode: spotting and sorting, then defaulting to the comfortable choice because it is faster.)
The Second Move works the same in a quick hallway moment and in a people-decision like hiring, assignments, or who gets the benefit of the doubt. Spanish: Detecta, Distingue, Sirve. "No puedes evitar el primer pensamiento. La segunda decision es tuya."

PART B — MICROAGGRESSIONS
What they are: brief, everyday verbal, behavioral, or environmental slights — whether intentional or unintentional — that communicate a negative or dismissive message to someone based on a part of their identity (race, ethnicity, accent, age, gender, disability, role, background, and so on). They are usually small and often unintended, but they add up and affect belonging, trust, and how safe people feel at work.

The training teaches three roles people find themselves in, and what to do in each:
1. EXPERIENCING a microaggression and RESPONDING: when it happens to you, you have choices — you can let it pass, name what you felt, ask a clarifying question, or address it later. There is no single right response; you get to decide what is safe and worth it for you.
2. CONTRIBUTING to a microaggression and LEARNING: when you are the one who said or did it, the move is to receive the feedback without defensiveness, acknowledge the impact (impact matters more than intent), repair briefly and sincerely, and adjust going forward. You do not need to over-apologize or make it about your own guilt.
3. OBSERVING a microaggression and SPEAKING UP: when you witness one, you can interrupt in the moment, check in with the person afterward, or raise it privately with the person who caused harm. Speaking up shares the labor so it does not all fall on the person who was targeted.

CONNECTION TO LIFEMOVES VALUES: Adaptability, Client-Centered, Collaboration, Diversity/Equity/Inclusion/Belonging, Integrity, Respect. Managing bias and microaggressions is how those stated values become daily behavior.
`;

/* ============ SIX PRINCIPLES (Layer 3) ============ */
const SIX_PRINCIPLES = `
You operate by six trauma-informed principles:
1. SAFETY: steady, warm, unhurried tone. Never shame or scold the learner. Normalize that these situations are hard.
2. TRUSTWORTHINESS & TRANSPARENCY: be clear about what you are doing. If you are about to offer a step from the training, say so. Never pretend to be a human, therapist, or supervisor. Never overstate certainty.
3. PEER SUPPORT: speak as a knowledgeable peer walking alongside, not an authority handing down verdicts. "Many people in this work find..." rather than "You must..."
4. COLLABORATION & MUTUALITY: build the response with the learner. Ask what they have already tried or considered. Treat their judgment as real input.
5. EMPOWERMENT, VOICE & CHOICE: surface the learner's own options and strengths. End turns with a choice or an opening, not an instruction. Never pressure toward one answer. Preserve their agency.
6. CULTURAL, HISTORICAL & GENDER HUMILITY: stay curious about context and identity. Never stereotype or assume what someone feels based on group identity. Ask rather than presume.
`;

/* ============ GLOBAL OVERRIDES ============ */
const HARD_STOPS = `[TWO HARD STOPS — these override everything above]
1. Never tell the person what their situation is. Do not label, diagnose, confirm, deny, or conclude — never say or imply something "is," "looks like," or "sounds like" discrimination, harassment, a hostile environment, retaliation, abuse, or any legal, HR, or clinical category, and never agree or disagree if the person uses that label themselves. That read is never yours to give.
2. When the person themselves names or clearly describes something serious or unsafe — harassment, threats, violence, abuse, discrimination, retaliation, or feeling unsafe — stop coaching. Do not apply the framework, offer a reframe, role-play it, or suggest they confront or respond to the other person. Warmly but plainly: what they're describing is serious and matters, it's more than a practice tool should hold, and they deserve a real person who can act on it. Point them to their supervisor or HR and to a trusted person for support, and note that writing down what happened with dates and details helps if they choose to raise it. Keep it short and human — firm and caring, never a cold brush-off — and add no framework commentary.
Only trigger stop #2 when the person themselves raises the seriousness or safety — never decide on your own, from ambiguous behavior, that an ordinary situation is one of these. For ordinary, everyday situations, stay present and coach with curiosity; never refuse or push the person away. Don't improvise legal, HR, or medical direction beyond pointing them to the right person, and don't invent organizational facts, policies, or people.`;

/* ============ CHAT ============ */
function startChat(key){
  const u=UI[lang];
  // concept uses guidance-style history bucket name; give each its own
  if(!histories[key]) histories[key]=[];
  histories[key]=[]; // fresh thread each open
  document.getElementById('chat-title').textContent = key==='concept'?u.modes[4].t:(key==='guidance'?u.modes[1].t:u.modes[5].t);
  document.getElementById('chat-back').textContent=u.back;
  document.getElementById('input').placeholder=u.placeholder;
  document.getElementById('hr-note').textContent=u.hrNote;
  // chips
  const chipBox=document.getElementById('chips'); chipBox.innerHTML='';
  const cset=(CHIPS[lang][key]||[]);
  cset.forEach(c=>{ const b=document.createElement('button'); b.className='chip'; b.textContent=c;
    b.onclick=()=>{document.getElementById('input').value=c; onSend();}; chipBox.appendChild(b); });
  // opener
  const inner=document.getElementById('thread-inner'); inner.innerHTML='';
  const opener=u.openers[key];
  histories[key].push({role:'assistant',content:opener});
  addBubble('assistant',opener,key);
}

function addBubble(role,text,key){
  const inner=document.getElementById('thread-inner');
  const b=document.createElement('div');
  b.className='bubble '+(role==='user'?'b-user':'b-ai');
  if(role==='assistant'){
    const eb=document.createElement('span'); eb.className='eb';
    eb.textContent = key==='isa' ? (lang==='es'?'Dra. Isa':'Dr. Isa') : 'Bias & Microaggressions';
    b.appendChild(eb);
    text.split(/\n\n+/).forEach(p=>{const el=document.createElement('p'); el.textContent=p; b.appendChild(el);});
  } else {
    b.textContent=text;
  }
  inner.appendChild(b);
  const thread=document.getElementById('thread'); thread.scrollTop=thread.scrollHeight;
}
function addTyping(){
  const inner=document.getElementById('thread-inner');
  const b=document.createElement('div'); b.className='bubble b-ai'; b.id='typing';
  b.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  inner.appendChild(b);
  const thread=document.getElementById('thread'); thread.scrollTop=thread.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing'); if(t)t.remove();}

function onSend(){
  const inp=document.getElementById('input'); const text=inp.value.trim();
  if(!text||isLoading)return;
  inp.value='';
  const key=mode;
  histories[key].push({role:'user',content:text});
  addBubble('user',text,key);
  sendTurn(key);
}
document.getElementById('input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();onSend();}
});

async function sendTurn(key){
  isLoading=true; document.getElementById('send').disabled=true; addTyping();
  const sys=buildSystemPrompt()+"\n\n[ACTIVE MODE]\n"+(MODE_INSTRUCTION[key]|| MODE_INSTRUCTION['guidance']||'')+"\n\n"+CRISIS+"\n\n"+HARD_STOPS;
  try{
    const r=await fetch("/api/chat",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:histories[key]})
    });
    const data=await r.json();
    const reply=data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
    removeTyping();
    histories[key].push({role:"assistant",content:reply});
    addBubble('assistant',reply,key);
  }catch(e){
    removeTyping();
    addBubble('assistant',UI[lang].err,key);
  }finally{
    isLoading=false; document.getElementById('send').disabled=false;
  }
}

- "medium": well-meaning but partly misses the tool or the impact.
- "least": accepts the snap judgment or reflects the bias.
Each option has its own short feedback (curious, no shame, in the training's vocabulary). Do NOT use a person's identity as a gotcha twist.
Respond in ${langName}. Return ONLY valid JSON, no markdown:
{"scenario":"...","options":[{"text":"...","rank":"best","feedback":"..."},{"text":"...","rank":"medium","feedback":"..."},{"text":"...","rank":"least","feedback":"..."}]}`;
  }
  return `Using the training, write ONE very short snap-judgment moment (one or two sentences) for staff in homeless/social services, based on: "${moment}".
Then write THREE short reads of that moment, ranked:
- "best": correctly names the assumption as a bias/trap from the training and reframes it with curiosity.
- "medium": partly catches it but misses the trap or the reframe.
- "least": accepts the snap judgment at face value.
Keep options to about 12 words and feedback to about 20 words, naming the trap in the training's vocabulary, no shame.
Respond in ${langName}. Return ONLY valid JSON, no markdown:
{"scenario":"...","options":[{"text":"...","rank":"best","feedback":"..."},{"text":"...","rank":"medium","feedback":"..."},{"text":"...","rank":"least","feedback":"..."}]}`;
}
async function loadQuizCard(){
  const u=UI[lang]; const inner=document.getElementById('quiz-inner');
  inner.innerHTML=`<div class="loader-card">${u.loading}</div>`;
  try{
    const r=await fetch("/api/chat",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
        system:buildSystemPrompt(),
        messages:[{role:"user",content:quizGenPrompt(quizState.kind)}]})
    });
    const data=await r.json();
    let txt=data.content.filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    txt=txt.replace(/```json/gi,'').replace(/```/g,'').trim();
    const obj=JSON.parse(txt);
    // shuffle
    for(let i=obj.options.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[obj.options[i],obj.options[j]]=[obj.options[j],obj.options[i]];}
    quizState.data=obj; quizState.locked=false;
    renderQuizCard();
  }catch(e){
    inner.innerHTML=`<div class="err-card">${u.err}<br><button onclick="loadQuizCard()">${u.retry}</button></div>`;
  }
}
function renderQuizCard(){
  const u=UI[lang]; const inner=document.getElementById('quiz-inner'); const obj=quizState.data;
  inner.innerHTML='';
  const sc=document.createElement('div'); sc.className='quiz-scenario'; sc.textContent=obj.scenario; inner.appendChild(sc);
  const pr=document.createElement('div'); pr.className='quiz-prompt'; pr.textContent=u.quizPrompt; inner.appendChild(pr);
  obj.options.forEach((opt,i)=>{
    const b=document.createElement('button'); b.className='opt'; b.textContent=opt.text;
    b.onclick=()=>pickOption(i,b); inner.appendChild(b);
  });
}
function pickOption(i,btn){
  if(quizState.locked && quizState.data.options[i].rank!=='best')return;
  const opt=quizState.data.options[i];
  const map={best:'best',medium:'med',least:'least'};
  btn.classList.add(map[opt.rank]);
  // feedback
  let fb=btn.nextElementSibling;
  if(!fb||!fb.classList.contains('fb')){
    fb=document.createElement('div'); fb.className='fb '+map[opt.rank]; fb.textContent=opt.feedback;
    btn.after(fb);
  }
  if(opt.rank==='best'){
    quizState.locked=true;
    document.querySelectorAll('.opt').forEach(o=>o.disabled=true);
    const u=UI[lang];
    const nb=document.createElement('button'); nb.className='next-btn';
    nb.textContent = quizState.kind==='scenario'?u.nextScenario:u.nextOne;
    nb.onclick=loadQuizCard;
    document.getElementById('quiz-inner').appendChild(nb);
  }else{
    btn.disabled=true;
  }
}

renderGate();
document.getElementById('picker').style.display='none';
document.getElementById('gate-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkGate();});
showGate();
